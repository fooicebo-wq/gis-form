<title>集思室內設計 - 房仲專屬轉介連結產生器</title>

<style>
    body {
        font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
        color: #555;
        line-height: 1.6;
        background-color: #fafafa;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 560px;
        margin: 20px auto;
        background: #fff;
        padding: 40px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        text-align: center;
    }
    .logo { width: 140px; margin-bottom: 20px; }
    h1 {
        font-size: 22px;
        font-weight: normal;
        letter-spacing: 4px;
        color: #555;
        border-bottom: 2px solid #a58e6f;
        display: inline-block;
        padding-bottom: 8px;
        margin: 0 0 10px 4px;
    }
    .desc { font-size: 14px; color: #888; margin-bottom: 30px; }
    .field { margin-bottom: 18px; text-align: left; }
    .field label { display: block; font-size: 15px; margin-bottom: 6px; color: #555; }
    .field .star { color: #a58e6f; }
    .field input {
        width: 100%;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 10px 12px;
        font-size: 16px;
        box-sizing: border-box;
        outline: none;
        transition: border-color .3s;
    }
    .field input:focus { border-color: #a58e6f; }
    .gen-btn {
        width: 100%;
        padding: 12px;
        background: #a58e6f;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        letter-spacing: 2px;
        cursor: pointer;
        margin-top: 8px;
    }
    .gen-btn:hover { background: #8f7a5d; }
    #result { display: none; margin-top: 35px; border-top: 1px dashed #ddd; padding-top: 30px; }
    #result h2 { font-size: 17px; font-weight: normal; color: #7a6749; }
    .link-box {
        background: #f5f0e8;
        border-radius: 6px;
        padding: 12px;
        font-size: 13px;
        word-break: break-all;
        color: #666;
        margin: 15px 0;
        text-align: left;
    }
    .btn-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
    .small-btn {
        padding: 8px 18px;
        border: 1px solid #a58e6f;
        background: #fff;
        color: #a58e6f;
        border-radius: 4px;
        font-size: 14px;
        cursor: pointer;
    }
    .small-btn:hover { background: #f5f0e8; }
    #qrcode { display: inline-block; padding: 12px; background: #fff; border: 1px solid #eee; }
    .hint { font-size: 13px; color: #999; margin-top: 15px; }
</style>

    <h1>房仲專屬轉介連結</h1>
    <p class="desc">輸入您的資料，立即產生您的專屬轉介連結與 QR Code。<br>
    客戶用您的連結填寫裝修需求表，案件自動記在您名下。</p>

    <div class="field">
        <label>您的姓名 <span class="star">*</span></label>
        <input type="text" id="aName" placeholder="例：王小明">
    </div>
    <div class="field">
        <label>所屬店名 <span class="star">*</span></label>
        <input type="text" id="aStore" placeholder="例：住商不動產○○加盟店">
    </div>
    <div class="field">
        <label>行動電話（選填，方便集思與您聯繫回報）</label>
        <input type="tel" id="aPhone" placeholder="例：0912-345-678">
    </div>
    <button class="gen-btn" onclick="generate()">產生我的專屬連結</button>

    <div id="result">
        <h2 id="resultTitle"></h2>
        <div class="link-box" id="linkBox"></div>
        <div class="btn-row">
            <button class="small-btn" onclick="copyLink()">複製連結</button>
            <button class="small-btn" onclick="downloadQR()">下載 QR Code</button>
        </div>
        <div id="qrcode"></div>
        <p class="hint">建議把 QR Code 存到手機相簿，或將連結加入 LINE 常用訊息，<br>遇到有裝修需求的客戶直接傳給對方即可。</p>
    </div>
</div>

<script>
let currentLink = '';
let agentLabel = '';

function generate() {
    const name = document.getElementById('aName').value.trim();
    const store = document.getElementById('aStore').value.trim();
    const phone = document.getElementById('aPhone').value.trim();
    if (!name || !store) {
        alert('請填寫姓名與所屬店名');
        return;
    }
    const params = new URLSearchParams({ rn: name, rs: store });
    if (phone) params.set('rp', phone);
    currentLink = location.href.split('agent.html')[0] + '?' + params.toString();
    agentLabel = store + ' ' + name;

    document.getElementById('resultTitle').textContent = agentLabel + ' 的專屬轉介連結';
    document.getElementById('linkBox').textContent = currentLink;
    document.getElementById('qrcode').innerHTML = '';
    new QRCode(document.getElementById('qrcode'), {
        text: currentLink,
        width: 220,
        height: 220,
        colorDark: '#5c4d38',
        colorLight: '#ffffff'
    });
    document.getElementById('result').style.display = 'block';
}

function copyLink() {
    navigator.clipboard.writeText(currentLink).then(
        () => alert('連結已複製！'),
        () => prompt('請手動複製連結：', currentLink)
    );
}

function downloadQR() {
    const img = document.querySelector('#qrcode img') || document.querySelector('#qrcode canvas');
    if (!img) return;
    const a = document.createElement('a');
    a.href = img.tagName === 'IMG' ? img.src : img.toDataURL('image/png');
    a.download = '轉介QRCode_' + agentLabel.replace(/\s+/g, '_') + '.png';
    a.click();
}
</script>
