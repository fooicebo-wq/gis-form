<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>集思室內設計 - 線上表單</title>
<style>
    body {
        font-family: 'PingFang TC', 'Heiti TC', 'Microsoft JhengHei', sans-serif;
        color: #555;
        line-height: 1.6;
        background-color: #fafafa;
        margin: 0;
        padding: 20px;
    }
    .container {
        max-width: 900px;
        margin: 20px auto;
        background: #fff;
        padding: 50px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.03);
    }
    .header-section {
        text-align: center;
        margin-bottom: 40px;
    }
    .logo {
        width: 170px;
        margin-bottom: 30px;
    }
    .title-wrapper {
        margin-bottom: 20px;
    }
    .title {
        font-size: 26px;
        font-weight: normal;
        letter-spacing: 8px;
        color: #555;
        display: inline-block;
        border-bottom: 2px solid #a58e6f;
        padding-bottom: 10px;
        margin-left: 8px;
    }
    .subtitle {
        font-size: 15px;
        color: #777;
        margin-top: 25px;
    }
    .subtitle p {
        margin: 5px 0;
    }
    .agent-banner {
        background: #f5f0e8;
        border: 1px solid #d9cbb5;
        border-radius: 6px;
        padding: 12px 18px;
        margin-bottom: 25px;
        font-size: 15px;
        color: #7a6749;
        text-align: center;
        display: none;
    }
    .required-text {
        text-align: right;
        color: #a58e6f;
        font-size: 14px;
        margin-bottom: 10px;
    }
    .form-group {
        display: flex;
        align-items: flex-start;
        padding: 25px 0;
        border-bottom: 1px solid #eaeaea;
    }
    .form-group:last-of-type {
        border-bottom: none;
    }
    .group-label {
        width: 140px;
        font-size: 16px;
        color: #555;
        flex-shrink: 0;
        padding-top: 2px;
    }
    .required-star {
        color: #a58e6f;
        margin-left: 5px;
    }
    .input-wrapper {
        flex-grow: 1;
    }
    input[type="text"], input[type="tel"], textarea {
        width: 100%;
        border: none;
        border-bottom: 1px solid #e5e5e5;
        outline: none;
        font-size: 16px;
        color: #333;
        background: transparent;
        padding: 4px 0;
        box-sizing: border-box;
        transition: border-color 0.3s;
    }
    input[type="text"]:focus, input[type="tel"]:focus, textarea:focus {
        border-bottom-color: #a58e6f;
    }
    textarea {
        resize: vertical;
        min-height: 60px;
        line-height: 1.5;
    }
    .radio-group {
        display: flex;
        flex-wrap: wrap;
        gap: 15px 25px;
    }
    .radio-label {
        display: flex;
        align-items: center;
        font-size: 16px;
        color: #666;
        cursor: pointer;
    }
    .radio-label input[type="radio"] {
        margin-right: 8px;
        appearance: none;
        width: 16px;
        height: 16px;
        border: 1px solid #999;
        border-radius: 50%;
        outline: none;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
    }
    .radio-label input[type="radio"]:checked {
        border-color: #a58e6f;
    }
    .radio-label input[type="radio"]:checked::before {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 8px;
        height: 8px;
        background-color: #a58e6f;
        border-radius: 50%;
    }
    .submit-btn {
        display: block;
        width: 100%;
        max-width: 200px;
        margin: 40px auto 0;
        padding: 12px;
        background-color: #a58e6f;
        color: #fff;
        text-align: center;
        border: none;
        border-radius: 4px;
        font-size: 16px;
        letter-spacing: 2px;
        cursor: pointer;
        transition: background 0.3s;
    }
    .submit-btn:hover {
        background-color: #8f7a5d;
    }
    .submit-btn:disabled {
        background-color: #ccc;
        cursor: not-allowed;
    }
    .success-box {
        display: none;
        text-align: center;
        padding: 60px 20px;
    }
    .success-box h2 {
        color: #a58e6f;
        font-weight: normal;
        letter-spacing: 4px;
    }
    .success-box p {
        color: #777;
        font-size: 16px;
    }

    @media (max-width: 600px) {
        .container {
            padding: 30px 20px;
        }
        .form-group {
            flex-direction: column;
            padding: 20px 0;
        }
        .group-label {
            margin-bottom: 15px;
        }
    }
</style>
</head>

        <div class="title-wrapper">
            <h1 class="title">線 上 表 單</h1>
        </div>

        <div class="subtitle">
            <p>最適合您的設計，就是最好的設計，集思室內設計傾聽您的想法</p>
            <p>在室內設計的規劃中，符合您的預算需求，用最佳優化的設計，滿足您的喜歡。</p>

    </div>

    <div class="agent-banner" id="agentBanner"></div>

    <div id="formArea">
    <div class="required-text">* 為必填欄位</div>

    <form id="mainForm">
        <!-- 姓名 -->
        <div class="form-group">
            <label class="group-label">姓名 <span class="required-star">*</span></label>
            <div class="input-wrapper">
                <input type="text" name="name" required>
            </div>
        </div>

        <!-- 電話 -->
        <div class="form-group">
            <label class="group-label">電話 <span class="required-star">*</span></label>
            <div class="input-wrapper">
                <input type="tel" name="phone" required>
            </div>
        </div>

        <!-- 建案名稱 -->
        <div class="form-group">
            <label class="group-label">建案名稱 <span class="required-star">*</span></label>
            <div class="input-wrapper">
                <input type="text" name="project_name" required>
            </div>
        </div>

        <!-- 房屋種類 -->
        <div class="form-group">
            <label class="group-label">房屋種類 <span class="required-star">*</span></label>
            <div class="input-wrapper radio-group">
                <label class="radio-label"><input type="radio" name="house_type" value="新成屋" required> 新成屋</label>
                <label class="radio-label"><input type="radio" name="house_type" value="預售屋"> 預售屋</label>
                <label class="radio-label"><input type="radio" name="house_type" value="毛胚屋"> 毛胚屋</label>
                <label class="radio-label"><input type="radio" name="house_type" value="透天別墅"> 透天別墅</label>
                <label class="radio-label"><input type="radio" name="house_type" value="自地自建"> 自地自建</label>
                <label class="radio-label"><input type="radio" name="house_type" value="舊屋翻新"> 舊屋翻新</label>
                <label class="radio-label"><input type="radio" name="house_type" value="辦公室"> 辦公室</label>
                <label class="radio-label"><input type="radio" name="house_type" value="店面裝修"> 店面裝修</label>
            </div>
        </div>

        <!-- 房屋裝修預算 -->
        <div class="form-group">
            <label class="group-label">房屋裝修預算 <span class="required-star">*</span></label>
            <div class="input-wrapper radio-group">
                <label class="radio-label"><input type="radio" name="budget" value="100萬以下" required> 100萬以下</label>
                <label class="radio-label"><input type="radio" name="budget" value="100-150萬"> 100-150萬</label>
                <label class="radio-label"><input type="radio" name="budget" value="150-200萬"> 150-200萬</label>
                <label class="radio-label"><input type="radio" name="budget" value="200-300萬"> 200-300萬</label>
                <label class="radio-label"><input type="radio" name="budget" value="300-500萬"> 300-500萬</label>
                <label class="radio-label"><input type="radio" name="budget" value="500萬以上"> 500萬以上</label>
            </div>
        </div>

        <!-- 從何得知我們 -->
        <div class="form-group">
            <label class="group-label">從何得知我們 <span class="required-star">*</span></label>
            <div class="input-wrapper radio-group">
                <label class="radio-label"><input type="radio" name="source" value="官網" required> 官網</label>
                <label class="radio-label"><input type="radio" name="source" value="Google搜尋"> Google 搜尋</label>
                <label class="radio-label"><input type="radio" name="source" value="GoogleMap"> Google map</label>
                <label class="radio-label"><input type="radio" name="source" value="Facebook"> Facebook</label>
                <label class="radio-label"><input type="radio" name="source" value="Instagram"> Instagram</label>
                <label class="radio-label"><input type="radio" name="source" value="Youtube"> Youtube</label>
                <label class="radio-label"><input type="radio" name="source" value="親友介紹"> 親友介紹</label>
                <label class="radio-label"><input type="radio" name="source" value="房仲介紹"> 房仲介紹</label>
                <label class="radio-label"><input type="radio" name="source" value="其他"> 其他</label>
            </div>
        </div>

        <!-- 方便聯繫時間 -->
        <div class="form-group">
            <label class="group-label">方便聯繫時間 <span class="required-star">*</span></label>
            <div class="input-wrapper radio-group">
                <label class="radio-label"><input type="radio" name="contact_time" value="9:00-12:00" required> 9:00-12:00</label>
                <label class="radio-label"><input type="radio" name="contact_time" value="14:00-18:00"> 14:00-18:00</label>
                <label class="radio-label"><input type="radio" name="contact_time" value="18:00後"> 18:00後</label>
            </div>
        </div>

        <!-- 介紹房仲（選填，通常由專屬連結自動帶入） -->
        <div class="form-group" id="agentFields">
            <label class="group-label">介紹房仲<br><span style="font-size:13px;color:#999;">(選填)</span></label>
            <div class="input-wrapper" style="display:flex; flex-wrap:wrap; gap:15px;">
                <input type="text" name="agent_name" placeholder="房仲姓名" style="flex:1; min-width:150px;">
                <input type="text" name="agent_store" placeholder="所屬店名（例：住商○○加盟店）" style="flex:2; min-width:200px;">
                <input type="hidden" name="agent_phone">
            </div>
        </div>

        <!-- 設計/裝修需求 -->
        <div class="form-group">
            <label class="group-label">設計/裝修需求 <span class="required-star">*</span></label>
            <div class="input-wrapper">
                <textarea name="requirements" placeholder="請簡述您的需求..." required></textarea>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">送出表單</button>
    </form>
    </div>

    <div class="success-box" id="successBox">
        <h2>已收到您的資料</h2>
        <p>感謝您的填寫，集思室內設計將盡快與您聯繫。</p>
    </div>
</div>

<script>
const GAS_URL = "__GAS_URL__";

// 從專屬連結帶入房仲資料（rn=姓名, rs=店名, rp=電話）
const qs = new URLSearchParams(location.search);
const rn = (qs.get('rn') || '').trim();
const rs = (qs.get('rs') || '').trim();
const rp = (qs.get('rp') || '').trim();
const form = document.getElementById('mainForm');
if (rn) {
    form.agent_name.value = rn;
    form.agent_store.value = rs;
    form.agent_phone.value = rp;
    const banner = document.getElementById('agentBanner');
    banner.textContent = '由 ' + (rs ? rs + ' ' : '') + rn + ' 為您轉介';
    banner.style.display = 'block';
    document.getElementById('agentFields').style.display = 'none';
    // 自動選「房仲介紹」
    const radio = form.querySelector('input[name="source"][value="房仲介紹"]');
    if (radio) radio.checked = true;
}

form.addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送出中…';
    try {
        await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: new URLSearchParams(new FormData(form))
        });
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('successBox').style.display = 'block';
        window.scrollTo(0, 0);
    } catch (err) {
        alert('送出失敗，請確認網路後再試一次。');
        btn.disabled = false;
        btn.textContent = '送出表單';
    }
});
</script>
